<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Overseer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #222;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #7c6af7;
      --accent-dim: #3d3566;
      --user-bg: #1a1a2e;
      --ai-bg: #141414;
      --green: #4ade80;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100dvh;
      display: grid;
      grid-template-rows: 48px 1fr auto;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    header h1 { font-size: 14px; font-weight: 600; letter-spacing: .05em; color: var(--text); }
    .status-pill {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      display: flex; gap: 16px;
    }
    .status-pill span { display: flex; align-items: center; gap: 4px; }

    /* ── messages ── */
    #messages {
      overflow-y: auto;
      padding: 20px 0;
      scroll-behavior: smooth;
    }
    .msg {
      max-width: 780px;
      margin: 0 auto 2px;
      padding: 12px 20px;
      display: flex;
      gap: 12px;
    }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      font-family: var(--mono);
    }
    .msg.user .avatar { background: var(--accent-dim); color: var(--accent); }
    .msg.ai .avatar   { background: #1e1e1e; color: var(--muted); border: 1px solid var(--border); }
    .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: calc(100% - 48px);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bg); border-color: var(--accent-dim); }

    /* tool call pills */
    .tool-calls {
      margin-top: 8px;
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .tool-pill {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
    }

    /* typing indicator */
    .typing .bubble { display: flex; align-items: center; gap: 4px; padding: 14px; }
    .typing .bubble span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      animation: bounce .8s infinite;
    }
    .typing .bubble span:nth-child(2) { animation-delay: .15s; }
    .typing .bubble span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

    /* ── input bar ── */
    #input-bar {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #msg-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      max-height: 160px;
      outline: none;
      line-height: 1.5;
    }
    #msg-input:focus { border-color: var(--accent-dim); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { opacity: .9; }

    /* ── trace panel ── */
    #trace-panel {
      display: none;
      position: fixed; top: 48px; right: 0; bottom: 0;
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      z-index: 10;
    }
    #trace-panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 12px; color: var(--text); }
    #trace-toggle {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
      font-family: var(--mono); margin-left: auto;
    }
    #trace-toggle:hover { border-color: var(--accent-dim); color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>OVERSEER</h1>
  <div class="status-pill">
    <span id="backend-label">—</span>
    <span id="vault-sync">—</span>
    <span id="token-count"></span>
  </div>
  <button id="trace-toggle" onclick="toggleTrace()">trace</button>
</header>

<div id="messages"></div>

<div id="input-bar">
  <textarea id="msg-input" rows="1" placeholder="Ask Overseer anything..." autofocus></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<div id="trace-panel">
  <h2>Live Trace</h2>
  <pre id="trace-content">Connecting...</pre>
</div>

<script>
const API = window.location.origin;
let traceOpen = false;
let sending = false;

// ── health check ──
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById('backend-label').textContent = `${d.backend}/${d.model?.split(':')[0]}`;
    document.getElementById('vault-sync').textContent = d.vault_last_sync ? `synced ${d.vault_last_sync.slice(0, 16)}` : 'vault ?';
    const total = Object.values(d.token_ledger || {}).reduce((a,b)=>a+b,0);
    const tokEl = document.getElementById('token-count');
    if (tokEl) tokEl.textContent = total ? `${total.toLocaleString()} tok` : '';
  } catch(e) {
    document.getElementById('backend-label').textContent = 'offline';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// ── trace SSE ──
function startTrace() {
  const es = new EventSource(`${API}/trace`);
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      document.getElementById('trace-content').textContent = d.content;
    } catch {}
  };
}
startTrace();

function toggleTrace() {
  traceOpen = !traceOpen;
  document.getElementById('trace-panel').style.display = traceOpen ? 'block' : 'none';
}

// ── messages ──
function appendMsg(role, text, toolCalls) {
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'YOU' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  if (toolCalls?.length) {
    const tc = document.createElement('div');
    tc.className = 'tool-calls';
    toolCalls.forEach(t => {
      const pill = document.createElement('span');
      pill.className = 'tool-pill';
      pill.textContent = t;
      tc.appendChild(pill);
    });
    bubble.appendChild(tc);
  }

  el.appendChild(avatar);
  el.appendChild(bubble);
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
  return el;
}

function addTyping() {
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg ai typing';
  el.id = 'typing-indicator';
  el.innerHTML = `<div class="avatar">AI</div><div class="bubble"><span></span><span></span><span></span></div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

// ── send ──
async function sendMessage() {
  if (sending) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', text);
  addTyping();
  sending = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const r = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });
    const d = await r.json();
    removeTyping();
    appendMsg('ai', d.response, d.tool_calls);
  } catch(e) {
    removeTyping();
    appendMsg('ai', `Error: ${e.message}`);
  } finally {
    sending = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

// ── enter to send ──
document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── auto-resize textarea ──
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});
</script>
</body>
</html>
