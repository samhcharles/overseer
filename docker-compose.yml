services:
  overseer:
    build: ./api
    restart: unless-stopped
    environment:
      - OVERSEER_BACKEND=${OVERSEER_BACKEND:-auto}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.0-flash-exp:free}
      - OPENROUTER_MODELS=${OPENROUTER_MODELS:-google/gemini-2.0-flash-exp:free,meta-llama/llama-3.3-70b-instruct:free,deepseek/deepseek-chat-v3-0324:free}
      - WORKER_URL=${WORKER_URL}
      - WORKER_SECRET=${WORKER_SECRET}
      - OVERSEER_API_KEY=${OVERSEER_API_KEY}
      - VAULT_PATH=/vault
      - USER_TIMEZONE=${USER_TIMEZONE:-America/Los_Angeles}
    ports:
      - "${OVERSEER_BIND_HOST:-127.0.0.1}:8765:8765"
    volumes:
      - vault_data:/vault
      - config_data:/config
    networks:
      - coolify
      - internal
  vault-sync:
    image: alpine/git
    restart: unless-stopped
    entrypoint: /bin/sh
    environment:
      - GIT_USER=${GIT_USER:-samhcus}
      - GIT_TOKEN=${GIT_TOKEN}
    volumes:
      - vault_data:/vault
    command: >
      -c "
        set -eu &&
        git config --global --add safe.directory /vault &&
        git config --global user.email 'overseer@brain' &&
        git config --global user.name 'Overseer' &&
        REMOTE=https://$$GIT_USER:$$GIT_TOKEN@github.com/samhcus/vault.git &&
        sync_once() {
          if [ ! -d /vault/.git ] || ! git -C /vault rev-parse HEAD >/dev/null 2>&1; then
            find /vault -mindepth 1 -maxdepth 1 -exec rm -rf {} + &&
            git clone $$REMOTE /vault || return 1;
          fi;
          git -C /vault remote set-url origin $$REMOTE || return 1;
          git -C /vault fetch origin main || return 1;
          set -- $$(git -C /vault rev-list --left-right --count HEAD...origin/main 2>/dev/null || echo '0 0');
          AHEAD=$$1;
          BEHIND=$$2;
          if [ $$AHEAD -gt 0 ]; then
            echo 'vault-sync: local commits present, skipping sync';
            return 0;
          fi;
          if ! git -C /vault diff --quiet || ! git -C /vault diff --cached --quiet; then
            echo 'vault-sync: local worktree dirty, skipping sync';
            return 0;
          fi;
          if [ $$BEHIND -gt 0 ]; then
            git -C /vault merge --ff-only origin/main || return 1;
            echo 'vault-sync: fast-forwarded';
            return 0;
          fi;
          echo 'vault-sync: up to date';
          return 0;
        } &&
        while true; do
          if sync_once; then
            sleep 300;
          else
            echo 'vault-sync: sync failed, retrying in 30s';
            sleep 30;
          fi;
        done
      "
    networks:
      - internal

volumes:
  vault_data:
  config_data:

networks:
  coolify:
    external: true
  internal:
