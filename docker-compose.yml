services:
  # Overseer API (Groq backend — switch to ollama when Oracle A1 ready)
  overseer:
    build: ./api
    restart: unless-stopped
    environment:
      - OVERSEER_BACKEND=groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.3-70b-versatile
      - VAULT_PATH=/vault
    volumes:
      - vault_data:/vault
    networks:
      - internal

  # Vault sync: git pull every 5 min
  vault-sync:
    image: alpine/git
    restart: unless-stopped
    environment:
      - VAULT_REPO=https://github.com/samhcharles/brain.git
      - GIT_USER=${GIT_USER:-samhcharles}
      - GIT_TOKEN=${GIT_TOKEN}
    volumes:
      - vault_data:/vault
    command: >
      sh -c "
        git config --global --add safe.directory /vault &&
        git config --global user.email 'overseer@brain' &&
        git config --global user.name 'Overseer' &&
        if [ ! -d /vault/.git ]; then
          git clone https://$$GIT_USER:$$GIT_TOKEN@github.com/samhcharles/brain.git /vault;
        fi &&
        git -C /vault remote set-url origin https://$$GIT_USER:$$GIT_TOKEN@github.com/samhcharles/brain.git &&
        while true; do
          git -C /vault pull --rebase origin main 2>&1 | tail -1;
          sleep 300;
        done
      "
    networks:
      - internal

  # nginx: serves chat UI + proxies /api/* to overseer
  overseer-gateway:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - overseer
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.overseer.rule=Host(`${OVERSEER_DOMAIN:-brain.localhost}`)"
      - "traefik.http.routers.overseer.entrypoints=websecure"
      - "traefik.http.routers.overseer.tls.certresolver=letsencrypt"
      - "traefik.http.services.overseer.loadbalancer.server.port=80"

volumes:
  vault_data:

networks:
  internal:
  proxy:
    external: true
