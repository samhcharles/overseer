services:
  overseer:
    build: ./api
    restart: unless-stopped
    environment:
      - OVERSEER_BACKEND=groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.3-70b-versatile
      - VAULT_PATH=/vault
    ports:
      - "8765:8765"
    volumes:
      - vault_data:/vault
    networks:
      - internal

  vault-sync:
    image: alpine/git
    restart: unless-stopped
    entrypoint: /bin/sh
    environment:
      - GIT_USER=${GIT_USER:-samhcharles}
      - GIT_TOKEN=${GIT_TOKEN}
    volumes:
      - vault_data:/vault
    command: >
      sh -c "
        git config --global --add safe.directory /vault &&
        git config --global user.email 'overseer@brain' &&
        git config --global user.name 'Overseer' &&
        if [ ! -d /vault/.git ]; then
          git clone https://$$GIT_USER:$$GIT_TOKEN@github.com/samhcharles/brain.git /vault;
        fi &&
        git -C /vault remote set-url origin https://$$GIT_USER:$$GIT_TOKEN@github.com/samhcharles/brain.git &&
        while true; do
          git -C /vault pull --rebase origin main 2>&1 | tail -1;
          sleep 300;
        done
      "
    networks:
      - internal

volumes:
  vault_data:

networks:
  internal:
