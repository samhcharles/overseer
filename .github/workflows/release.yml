name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v0.1.1)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: false

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: '' }
          - { goos: linux,   goarch: arm64, ext: '' }
          - { goos: darwin,  goarch: amd64, ext: '' }
          - { goos: darwin,  goarch: arm64, ext: '' }
          - { goos: windows, goarch: amd64, ext: '.exe' }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: tui-go/go.sum
      - name: Build
        working-directory: tui-go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o "overseer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: tui-go/overseer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  publish-npm:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Sync version from tag
        working-directory: tui-go/npm
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: tui-go/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
